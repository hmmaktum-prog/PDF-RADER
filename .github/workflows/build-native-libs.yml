name: "Build & Save Native Libraries (Once)"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# এই workflow শুধুমাত্র একবার manually run করতে হবে।
# QPDF + MuPDF .so ফাইল build করে repository-তে permanently save করবে।
# একবার save হলে EAS Build workflow আর কখনো এটি চালাবে না।
#
# চালানোর নিয়ম:
#   GitHub → Actions → "Build & Save Native Libraries (Once)" → Run workflow
#
# Required secrets:
#   GH_PAT  — GitHub Personal Access Token (repo write permission)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'আবার build করবে, আগে থেকে থাকলেও (true/false)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-save:
    name: "Build QPDF + MuPDF .so (Permanent Save)"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Already built check
        id: check
        run: |
          ARM64_QPDF="mobile/native/third_party/qpdf/libs/arm64-v8a/libqpdf.so"
          ARM64_MUPDF="mobile/native/third_party/mupdf/libs/arm64-v8a/libmupdf.so"
          ARM64_PADDLE="mobile/native/third_party/paddle-lite/libs/arm64-v8a/libpaddle_light_api_shared.so"
          ARM64_BRIDGE="mobile/native/third_party/pdfpowertools_native/libs/arm64-v8a/libpdfpowertools_native.so"
          
          X86_QPDF="mobile/native/third_party/qpdf/libs/x86_64/libqpdf.so"
          X86_MUPDF="mobile/native/third_party/mupdf/libs/x86_64/libmupdf.so"
          X86_PADDLE="mobile/native/third_party/paddle-lite/libs/x86_64/libpaddle_light_api_shared.so"
          X86_BRIDGE="mobile/native/third_party/pdfpowertools_native/libs/x86_64/libpdfpowertools_native.so"
          
          echo "=== বিদ্যমান .so files ==="
          find mobile/native/third_party -name '*.so' 2>/dev/null || echo "(none)"
          if [[ -f "$ARM64_QPDF" && -f "$ARM64_MUPDF" && -f "$X86_QPDF" && -f "$X86_MUPDF" && -f "$ARM64_PADDLE" && -f "$X86_PADDLE" && -f "$ARM64_BRIDGE" && -f "$X86_BRIDGE" && "${{ github.event.inputs.force }}" != "true" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✓ সব .so (QPDF, MuPDF, Paddle, Bridge) আছে — build skip। force=true দিয়ে আবার run করুন।"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "→ Build শুরু হবে (বা আগের কোনো .so ফাইল অনুপস্থিত)।"
          fi

      - name: Cache NDK
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        id: cache-ndk
        with:
          path: ${{ runner.home }}/Android/Sdk/ndk/25.2.9519653
          key: ndk-r25b-permanent-v2

      - name: Pre-create source directories
        if: steps.check.outputs.skip != 'true'
        run: mkdir -p .native_src/libjpeg-turbo .native_src/qpdf .native_src/mupdf-1.27.2-source

      - name: Cache sources
        if: steps.check.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: |
            .native_src/libjpeg-turbo
            .native_src/qpdf
            .native_src/mupdf-1.27.2-source
          key: native-src-all-v5
          restore-keys: |
            native-src-all-

      - name: Install tools
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q cmake ninja-build build-essential \
            pkg-config git curl nasm

      - name: Download NDK r25b
        if: steps.check.outputs.skip != 'true' && steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/Android/Sdk/ndk
          curl -L --progress-bar -o /tmp/ndk.zip \
            "https://dl.google.com/android/repository/android-ndk-r25b-linux.zip"
          unzip -q /tmp/ndk.zip -d ~/Android/Sdk/ndk
          mv ~/Android/Sdk/ndk/android-ndk-r25b ~/Android/Sdk/ndk/25.2.9519653
          rm -f /tmp/ndk.zip
          echo "✓ NDK ready"

      - name: Clone sources
        if: steps.check.outputs.skip != 'true'
        run: |
          mkdir -p .native_src

          # libjpeg-turbo
          if [[ ! -d ".native_src/libjpeg-turbo/.git" ]]; then
            git clone --depth 1 https://github.com/libjpeg-turbo/libjpeg-turbo.git \
              .native_src/libjpeg-turbo
          fi

          # QPDF v11.9.1
          if [[ ! -d ".native_src/qpdf/.git" ]]; then
            git clone --depth 1 --branch v11.9.1 https://github.com/qpdf/qpdf.git \
              .native_src/qpdf
          fi

          # MuPDF 1.27.2 (Makefile-based, submodule সহ)
          if [[ ! -d ".native_src/mupdf-1.27.2-source/.git" ]]; then
            [[ -d ".native_src/mupdf-1.27.2-source" ]] && rm -rf ".native_src/mupdf-1.27.2-source"
            git clone --depth 1 --branch 1.27.2 \
              --recurse-submodules --shallow-submodules \
              https://github.com/ArtifexSoftware/mupdf.git \
              .native_src/mupdf-1.27.2-source
          fi
          echo "✓ Sources ready"
          ls .native_src/mupdf-1.27.2-source/ | head -8

      - name: Build QPDF (arm64-v8a + x86_64)
        if: steps.check.outputs.skip != 'true'
        env:
          ANDROID_NDK_ROOT: /home/runner/Android/Sdk/ndk/25.2.9519653
        run: |
          NDK="$ANDROID_NDK_ROOT"
          TOOLCHAIN="$NDK/build/cmake/android.toolchain.cmake"
          SYSROOT="$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          SRC="$(pwd)/.native_src"
          THIRD="$(pwd)/mobile/native/third_party"

          for ABI in arm64-v8a x86_64; do
            echo "━━ QPDF: $ABI ━━"
            if [[ -f "$THIRD/qpdf/libs/$ABI/libqpdf.so" ]]; then
              echo "QPDF/$ABI already exists — skip"
              continue
            fi

            case "$ABI" in
              arm64-v8a) TRIPLE="aarch64-linux-android" ;;
              x86_64)    TRIPLE="x86_64-linux-android" ;;
            esac
            SYSLIB="$SYSROOT/usr/lib/$TRIPLE"

            # libjpeg-turbo
            JPEG_INSTALL="$SRC/jpeg-install-$ABI"
            mkdir -p "$SRC/jpeg-build-$ABI" "$JPEG_INSTALL"
            cmake \
              -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
              -DANDROID_ABI="$ABI" -DANDROID_PLATFORM=android-24 \
              -DANDROID_STL=c++_shared -DCMAKE_BUILD_TYPE=Release \
              -DENABLE_SHARED=ON -DENABLE_STATIC=OFF -DWITH_JPEG8=ON \
              -DCMAKE_INSTALL_PREFIX="$JPEG_INSTALL" \
              -S "$SRC/libjpeg-turbo" -B "$SRC/jpeg-build-$ABI"
            cmake --build "$SRC/jpeg-build-$ABI" -j"$(nproc)"
            cmake --install "$SRC/jpeg-build-$ABI"

            # libjpeg.pc তৈরি করো — QPDF-এর CMake pkg-config খোঁজে
            PKGCONFIG_DIR="$JPEG_INSTALL/lib/pkgconfig"
            mkdir -p "$PKGCONFIG_DIR"
            {
              echo "prefix=$JPEG_INSTALL"
              echo 'exec_prefix=${prefix}'
              echo 'libdir=${exec_prefix}/lib'
              echo 'includedir=${prefix}/include'
              echo ''
              echo 'Name: libjpeg'
              echo 'Description: Android cross-compiled libjpeg-turbo'
              echo 'Version: 2.1.0'
              echo 'Libs: -L${libdir} -ljpeg'
              echo 'Cflags: -I${includedir}'
            } > "$PKGCONFIG_DIR/libjpeg.pc"
            echo "✓ libjpeg.pc created: $PKGCONFIG_DIR/libjpeg.pc"

            # QPDF
            mkdir -p "$SRC/qpdf-build-$ABI"
            PKG_CONFIG_SYSROOT_DIR="" \
            PKG_CONFIG_PATH="$PKGCONFIG_DIR" \
            PKG_CONFIG_LIBDIR="$PKGCONFIG_DIR" \
            cmake \
              -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
              -DANDROID_ABI="$ABI" -DANDROID_PLATFORM=android-24 \
              -DANDROID_STL=c++_shared -DCMAKE_BUILD_TYPE=Release \
              -Dqpdf_build_tools=OFF -Dqpdf_build_tests=OFF \
              -Dqpdf_build_examples=OFF -DBUILD_SHARED_LIBS=ON \
              -DREQUIRE_CRYPTO_OPENSSL=OFF -DREQUIRE_CRYPTO_GNUTLS=OFF \
              -DUSE_INSECURE_RANDOM=ON \
              -DCMAKE_PREFIX_PATH="$JPEG_INSTALL" \
              -DJPEG_LIBRARY="$JPEG_INSTALL/lib/libjpeg.so" \
              -DJPEG_INCLUDE_DIR="$JPEG_INSTALL/include" \
              -DJPEG_INCLUDE_DIRS="$JPEG_INSTALL/include" \
              -DZLIB_LIBRARY="$SYSLIB/libz.so" \
              -DZLIB_INCLUDE_DIR="$SYSROOT/usr/include" \
              "-DCMAKE_C_FLAGS=-I$JPEG_INSTALL/include" \
              "-DCMAKE_CXX_FLAGS=-I$JPEG_INSTALL/include" \
              -S "$SRC/qpdf" -B "$SRC/qpdf-build-$ABI"
            cmake --build "$SRC/qpdf-build-$ABI" -j"$(nproc)"

            mkdir -p "$THIRD/qpdf/libs/$ABI"
            QPDF_SO=$(find "$SRC/qpdf-build-$ABI" -name 'libqpdf.so' | head -1)
            if [[ -z "$QPDF_SO" ]]; then
              echo "ERROR: libqpdf.so build হয়নি ($ABI) — cmake output দেখুন।" >&2
              exit 1
            fi
            cp "$QPDF_SO" "$THIRD/qpdf/libs/$ABI/"
            cp "$SRC/jpeg-install-$ABI/lib/libjpeg.so" "$THIRD/qpdf/libs/$ABI/" 2>/dev/null || true
            echo "✓ QPDF/$ABI done: $(ls -lh $THIRD/qpdf/libs/$ABI/)"
          done

      - name: Build MuPDF (arm64-v8a + x86_64)
        if: steps.check.outputs.skip != 'true'
        env:
          ANDROID_NDK_ROOT: /home/runner/Android/Sdk/ndk/25.2.9519653
        run: |
          NDK="$ANDROID_NDK_ROOT"
          CLANG_DIR="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin"
          SYSROOT="$NDK/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          TOOLCHAIN="$NDK/build/cmake/android.toolchain.cmake"
          MUPDF_SRC=".native_src/mupdf-1.27.2-source"
          THIRD="mobile/native/third_party"

          # ── Check if MuPDF has CMakeLists.txt ─────────────────────────────
          if [[ -f "$MUPDF_SRC/CMakeLists.txt" ]]; then
            echo "→ MuPDF: Using CMake build (modern)"
            USE_CMAKE=1
          else
            echo "→ MuPDF: Using Makefile build (fallback)"
            USE_CMAKE=0
          fi

          for ABI in arm64-v8a x86_64; do
            echo "━━ MuPDF: $ABI ━━"
            if [[ -f "$THIRD/mupdf/libs/$ABI/libmupdf.so" ]]; then
              echo "MuPDF/$ABI already exists — skip"
              continue
            fi

            case "$ABI" in
              arm64-v8a) TRIPLE="aarch64-linux-android" ;;
              x86_64)    TRIPLE="x86_64-linux-android" ;;
            esac

            CC_="$CLANG_DIR/${TRIPLE}24-clang"
            CXX_="$CLANG_DIR/${TRIPLE}24-clang++"
            AR_="$CLANG_DIR/llvm-ar"
            RANLIB_="$CLANG_DIR/llvm-ranlib"
            STRIP_="$CLANG_DIR/llvm-strip"

            MUPDF_SO=""

            if [[ "$USE_CMAKE" == "1" ]]; then
              # ── CMake build ─────────────────────────────────────────────────
              BUILD_DIR="$MUPDF_SRC/build-cmake-$ABI"
              mkdir -p "$BUILD_DIR"
              cmake \
                -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
                -DANDROID_ABI="$ABI" \
                -DANDROID_PLATFORM="android-24" \
                -DANDROID_STL="c++_shared" \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_SHARED_LIBS=OFF \
                -DMUPDF_THREADING=OFF \
                -DHAVE_GLFW=OFF -DHAVE_X11=OFF \
                -DFT_DISABLE_ZLIB=OFF \
                -DCMAKE_C_FLAGS="-fPIC -DNDEBUG -DHAVE_ANDROID" \
                -DCMAKE_CXX_FLAGS="-fPIC -DNDEBUG -DHAVE_ANDROID" \
                -S "$MUPDF_SRC" -B "$BUILD_DIR" \
                -G Ninja
              ninja -C "$BUILD_DIR" -j"$(nproc)" 2>&1 | tail -60

              # Try to find libmupdf.a or libmupdf.so
              MUPDF_A=$(find "$BUILD_DIR" -name 'libmupdf.a' 2>/dev/null | head -1)
              MUPDF_THIRD_A=$(find "$BUILD_DIR" -name 'libmupdf-third*.a' 2>/dev/null | head -1)
              MUPDF_DIRECT_SO=$(find "$BUILD_DIR" -name 'libmupdf.so' 2>/dev/null | head -1)

              if [[ -n "$MUPDF_DIRECT_SO" ]]; then
                mkdir -p "$THIRD/mupdf/libs/$ABI"
                cp "$MUPDF_DIRECT_SO" "$THIRD/mupdf/libs/$ABI/"
                MUPDF_SO="$THIRD/mupdf/libs/$ABI/libmupdf.so"
              elif [[ -n "$MUPDF_A" ]]; then
                mkdir -p "$THIRD/mupdf/libs/$ABI"
                WHOLE_ARGS="$MUPDF_A"
                [[ -n "$MUPDF_THIRD_A" ]] && WHOLE_ARGS="$MUPDF_A $MUPDF_THIRD_A"
                "$CC_" -shared \
                  -Wl,--whole-archive $WHOLE_ARGS \
                  -Wl,--no-whole-archive \
                  -Wl,-soname,libmupdf.so \
                  -lz -lm -llog -landroid \
                  -o "$THIRD/mupdf/libs/$ABI/libmupdf.so"
                MUPDF_SO="$THIRD/mupdf/libs/$ABI/libmupdf.so"
              fi
            fi

            # ── Makefile build (fallback or if CMake failed) ─────────────────
            if [[ -z "$MUPDF_SO" ]]; then
              echo "→ Attempting Makefile build for $ABI..."
              # OUT= must be an ABSOLUTE path — make -C changes cwd to MuPDF dir,
              # so a relative OUT= would resolve inside MuPDF dir (double-nesting bug).
              BUILD_OUT="$(pwd)/mupdf-build-${ABI}"
              mkdir -p "$BUILD_OUT"
              XCFLAGS="-fPIC -D_GNU_SOURCE -DHAVE_ANDROID -DNOBUILTINFONT"

              # 'libs' target builds only libmupdf.a + libmupdf-third.a,
              # skipping mutool/mupdf executables that need -lpthread (missing on Android NDK).
              make -C "$MUPDF_SRC" libs \
                CC="$CC_" CXX="$CXX_" AR="$AR_" RANLIB="$RANLIB_" \
                build=release \
                OUT="$BUILD_OUT" \
                XCFLAGS="$XCFLAGS" \
                HAVE_X11=no HAVE_GLFW=no HAVE_OBJCOPY=no \
                HAVE_TESSERACT=no HAVE_LEPTONICA=no \
                HAVE_CURL=no HAVE_GUMBO=no HAVE_ZXING=no \
                HAVE_LIBCRYPTO=no HAVE_LIBRESSL=no \
                HAVE_ANDROID=yes \
                verbose=no \
                -j"$(nproc)" 2>&1 | tail -80

              echo "→ Searching for libmupdf.a in $BUILD_OUT ..."
              ls "$BUILD_OUT"/*.a 2>/dev/null || echo "  (no .a files found)"
              MUPDF_A=$(find "$BUILD_OUT" -name 'libmupdf.a' 2>/dev/null | head -1)
              MUPDF_THIRD_A=$(find "$BUILD_OUT" -name 'libmupdf-third.a' 2>/dev/null | head -1)

              if [[ -n "$MUPDF_A" ]]; then
                mkdir -p "$THIRD/mupdf/libs/$ABI"
                WHOLE_ARGS="$MUPDF_A"
                [[ -n "$MUPDF_THIRD_A" ]] && WHOLE_ARGS="$MUPDF_A $MUPDF_THIRD_A"
                "$CC_" -shared \
                  -Wl,--whole-archive $WHOLE_ARGS \
                  -Wl,--no-whole-archive \
                  -Wl,-soname,libmupdf.so \
                  -lz -lm -llog -landroid \
                  -o "$THIRD/mupdf/libs/$ABI/libmupdf.so"
                MUPDF_SO="$THIRD/mupdf/libs/$ABI/libmupdf.so"
              fi
            fi

            if [[ -n "$MUPDF_SO" && -f "$MUPDF_SO" ]]; then
              "$STRIP_" --strip-unneeded "$MUPDF_SO" 2>/dev/null || true
              echo "✓ MuPDF/$ABI: $(ls -lh $MUPDF_SO)"
            else
              echo "⚠ MuPDF/$ABI: ALL build methods failed!"
              echo "  Build dir contents:"
              echo "  → mupdf-build-${ABI} contents:"
              find "$BUILD_OUT" -maxdepth 2 -type f 2>/dev/null | head -20 || true
              echo "  → mupdf source build/ dir contents:"
              find "$MUPDF_SRC/build" -maxdepth 2 -type f -name '*.a' 2>/dev/null | head -10 || true
              exit 1
            fi
          done

      - name: Download Paddle-Lite Prebuilts
        if: steps.check.outputs.skip != 'true'
        run: |
          THIRD="mobile/native/third_party"
          mkdir -p "$THIRD/paddle-lite/libs/arm64-v8a"
          mkdir -p "$THIRD/paddle-lite/libs/x86_64"
          mkdir -p "$THIRD/paddle-lite/include"

          echo "Downloading Paddle-Lite v2.12 Android arm64-v8a prebuilt..."
          # armv8 clang shared with_extra
          ARM64_URL="https://github.com/PaddlePaddle/Paddle-Lite/releases/download/v2.12/inference_lite_lib.android.armv8.clang.c%2B%2B_shared.with_extra.tar.gz"
          if curl -fL -o /tmp/paddle-arm64.tar.gz "$ARM64_URL"; then
            mkdir -p /tmp/paddle-arm64
            tar -xzf /tmp/paddle-arm64.tar.gz -C /tmp/paddle-arm64 --strip-components=1
            ARM64_SO=$(find /tmp/paddle-arm64 -name 'libpaddle_light_api_shared.so' | head -1)
            PADDLE_INC=$(find /tmp/paddle-arm64 -name 'include' -type d | head -1)
            [[ -n "$ARM64_SO" ]] && cp "$ARM64_SO" "$THIRD/paddle-lite/libs/arm64-v8a/" && echo "✓ arm64 SO ready"
            [[ -n "$PADDLE_INC" ]] && cp -r "$PADDLE_INC/." "$THIRD/paddle-lite/include/" && echo "✓ headers copied"
            rm -rf /tmp/paddle-arm64 /tmp/paddle-arm64.tar.gz
          else
            echo "⚠ Paddle-Lite arm64 download failed — build continues without Paddle OCR"
          fi

          echo "Paddle-Lite Android x86_64: skipping (no official prebuilt in v2.12 release)"
          echo "✓ Paddle-Lite step complete."

      - name: Copy headers
        if: steps.check.outputs.skip != 'true'
        run: |
          SRC=".native_src"
          THIRD="mobile/native/third_party"
          mkdir -p "$THIRD/qpdf/include" "$THIRD/mupdf/include"
          [[ -d "$SRC/qpdf/include" ]] && \
            cp -r "$SRC/qpdf/include/." "$THIRD/qpdf/include/" 2>/dev/null || true
          [[ -d "$SRC/mupdf-1.27.2-source/include" ]] && \
            cp -r "$SRC/mupdf-1.27.2-source/include/." \
            "$THIRD/mupdf/include/" 2>/dev/null || true
          echo "✓ Headers copied"

      - name: Build Custom JNI Bridge (libpdfpowertools_native.so)
        if: steps.check.outputs.skip != 'true'
        env:
          ANDROID_NDK_ROOT: /home/runner/Android/Sdk/ndk/25.2.9519653
        run: |
          NDK="$ANDROID_NDK_ROOT"
          TOOLCHAIN="$NDK/build/cmake/android.toolchain.cmake"
          SRC="$(pwd)/mobile/native"
          THIRD="$SRC/third_party"
          
          mkdir -p "$SRC/standalone"
          cat << 'EOF' > "$SRC/standalone/CMakeLists.txt"
          cmake_minimum_required(VERSION 3.18)
          project(pdfpowertools_native)
          
          find_library(log-lib log)
          find_library(android-lib android)
          
          set(SOURCE_FILES ../src/qpdf_bridge.cpp ../src/mupdf_bridge.cpp)
          set(LINK_LIBS qpdf jpeg mupdf ${log-lib} ${android-lib})
          set(HAS_PADDLE 0)
          
          if(EXISTS "${CMAKE_CURRENT_SOURCE_DIR}/../third_party/paddle-lite/libs/${CMAKE_ANDROID_ARCH_ABI}/libpaddle_light_api_shared.so")
              message(STATUS "Paddle-Lite found for ${CMAKE_ANDROID_ARCH_ABI} - Enabling OCR")
              list(APPEND SOURCE_FILES ../src/paddle_ocr_bridge.cpp)
              add_library(paddle_lite SHARED IMPORTED)
              set_target_properties(paddle_lite PROPERTIES IMPORTED_LOCATION "${CMAKE_CURRENT_SOURCE_DIR}/../third_party/paddle-lite/libs/${CMAKE_ANDROID_ARCH_ABI}/libpaddle_light_api_shared.so")
              list(APPEND LINK_LIBS paddle_lite)
              set(HAS_PADDLE 1)
          else()
              message(WARNING "Paddle-Lite NOT found for ${CMAKE_ANDROID_ARCH_ABI} - OCR will be disabled")
          endif()
          
          add_library(pdfpowertools_native SHARED ${SOURCE_FILES})
          target_compile_features(pdfpowertools_native PRIVATE cxx_std_20)
          target_include_directories(pdfpowertools_native PRIVATE 
              ../src 
              ../third_party/qpdf/include 
              ../third_party/mupdf/include 
              ../third_party/paddle-lite/include
          )
          
          target_compile_definitions(pdfpowertools_native PRIVATE 
              HAS_QPDF=1 HAS_MUPDF=1 HAS_PADDLE=${HAS_PADDLE} POINTERHOLDER_TRANSITION=0
          )
          
          add_library(qpdf SHARED IMPORTED)
          set_target_properties(qpdf PROPERTIES IMPORTED_LOCATION "${CMAKE_CURRENT_SOURCE_DIR}/../third_party/qpdf/libs/${CMAKE_ANDROID_ARCH_ABI}/libqpdf.so")
          
          add_library(jpeg SHARED IMPORTED)
          set_target_properties(jpeg PROPERTIES IMPORTED_LOCATION "${CMAKE_CURRENT_SOURCE_DIR}/../third_party/qpdf/libs/${CMAKE_ANDROID_ARCH_ABI}/libjpeg.so")
          
          add_library(mupdf SHARED IMPORTED)
          set_target_properties(mupdf PROPERTIES IMPORTED_LOCATION "${CMAKE_CURRENT_SOURCE_DIR}/../third_party/mupdf/libs/${CMAKE_ANDROID_ARCH_ABI}/libmupdf.so")
          
          target_link_options(pdfpowertools_native PRIVATE -Wl,--no-fatal-warnings)
          target_link_libraries(pdfpowertools_native ${LINK_LIBS})
          EOF
          
          for ABI in arm64-v8a x86_64; do
            echo "━━ Bridge: $ABI ━━"
            mkdir -p "$SRC/standalone/build-$ABI"
            cmake \
              -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
              -DANDROID_ABI="$ABI" -DANDROID_PLATFORM=android-24 \
              -DANDROID_STL=c++_shared -DCMAKE_BUILD_TYPE=Release \
              "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,--no-fatal-warnings" \
              -S "$SRC/standalone" -B "$SRC/standalone/build-$ABI" -G Ninja || exit 1
            
            ninja -C "$SRC/standalone/build-$ABI" || exit 1
            
            mkdir -p "$THIRD/pdfpowertools_native/libs/$ABI"
            cp "$SRC/standalone/build-$ABI/libpdfpowertools_native.so" "$THIRD/pdfpowertools_native/libs/$ABI/"
            echo "✓ Built Custom JNI Bridge .so for $ABI"
          done

      - name: Show final .so files
        run: |
          echo "━━━━━━━ তৈরি হওয়া সব .so files ━━━━━━━"
          find mobile/native/third_party -name '*.so' \
            | while read f; do ls -lh "$f"; done || echo "(none)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Commit .so files permanently to repository
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          REPO_URL="https://x-access-token:${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git remote set-url origin "$REPO_URL"

          git add mobile/native/third_party/ || true

          if git diff --cached --quiet; then
            echo "কোনো নতুন .so নেই — ইতোমধ্যে up to date।"
          else
            git commit -m "feat: add prebuilt native .so libraries (QPDF + MuPDF) [skip ci]"
            git push origin HEAD:main
            echo "✓ .so files চিরতরে repository-তে save হয়ে গেছে!"
            echo "✓ এখন থেকে EAS Build workflow আর কখনো native build করবে না।"
          fi
